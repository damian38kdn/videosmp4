        sessionStorage.setItem("watchedVideosAmateur", JSON.stringify(watchedVideos));
    }
    
    const unwatched = videosAmateur.filter((_, index) => !watchedVideos.includes(index));
    
    if (unwatched.length === 0) {
        watchedVideos = [];
        sessionStorage.setItem("watchedVideosAmateur", JSON.stringify(watchedVideos));
        return getUnwatchedVideo();
    }
    
    const randomIndex = Math.floor(Math.random() * unwatched.length);
    const selectedVideo = unwatched[randomIndex];
    const originalIndex = videosAmateur.findIndex(v => v.url === selectedVideo.url);
    
    return originalIndex;
}

function markAsWatched(index) {
    if (!watchedVideos.includes(index)) {
        watchedVideos.push(index);
        sessionStorage.setItem("watchedVideosAmateur", JSON.stringify(watchedVideos));
        updateProgressDots();
    }
}

function updateProgressDots() {
    const container = document.getElementById("progressDots");
    if (!container) return;
    
    const total = videosAmateur.length;
    const watched = watchedVideos.length;
    const maxDots = 20;
    const step = Math.ceil(total / maxDots);
    
    let dotsHtml = '';
    for (let i = 0; i < total; i += step) {
        const isWatched = watchedVideos.includes(i);
        dotsHtml += `<div class="dot ${isWatched ? 'watched' : ''}"></div>`;
    }
    container.innerHTML = dotsHtml;
    
    const videoPos = document.getElementById("videoPosition");
    if (videoPos) {
        videoPos.textContent = `📍 Vistos: ${watched}/${total}`;
    }
}

function showToast(message, duration = 2000) {
    const toast = document.createElement("div");
    toast.className = "toast";
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), duration);
}

function showLoading(show) {
    const loading = document.getElementById("loading");
    if (show) {
        loading.classList.add("active");
    } else {
        loading.classList.remove("active");
    }
}

function formatNumber(num) {
    if (num >= 1000000) return (num / 1000000).toFixed(1) + "M";
    if (num >= 1000) return (num / 1000).toFixed(1) + "K";
    return num.toString();
}

function updateVideoInfo(index) {
    const video = videosAmateur[index];
    document.getElementById("videoTitle").textContent = video.title;
    document.getElementById("videoViews").textContent = `👁️ ${formatNumber(video.views)} vistas`;
    document.getElementById("videoDuration").textContent = `⏱️ ${video.duration}`;
}

function loadVideo(index, autoplay = true) {
    if (index < 0) index = 0;
    if (index >= videosAmateur.length) index = 0;
    
    currentVideoIndex = index;
    const videoData = videosAmateur[currentVideoIndex];
    
    showLoading(true);
    const video = document.getElementById("video");
    video.src = videoData.url;
    video.load();
    
    if (autoplay) {
        video.play().catch(e => {
            showToast("🎬 Haz clic en play para comenzar", 2000);
        });
    }
    
    video.addEventListener('canplay', () => {
        showLoading(false);
        markAsWatched(currentVideoIndex);
        incrementViews(currentVideoIndex);
        addToHistory(currentVideoIndex);
        updateNextVideo();
        updateRecommended();
        updateTopList();
        updateButtonsState();
    }, { once: true });
    
    updateVideoInfo(currentVideoIndex);
}

function loadNextVideo() {
    const newIndex = getUnwatchedVideo();
    loadVideo(newIndex, true);
    showToast(`⏩ Siguiente: ${videosAmateur[newIndex].title}`, 1500);
}

function loadPreviousVideo() {
    if (watchHistory.length > 1) {
        const previousIndex = watchHistory[watchHistory.length - 2];
        loadVideo(previousIndex, true);
        showToast(`◀◀ Anterior: ${videosAmateur[previousIndex].title}`, 1500);
    } else {
        showToast("⚠️ No hay video anterior en el historial", 1500);
    }
}

function incrementViews(index) {
    videosAmateur[index].views += 1;
    localStorage.setItem("amateurViews", JSON.stringify(videosAmateur.map(v => v.views)));
    updateVideoInfo(index);
    updateTopList();
}

function addToHistory(index) {
    if (watchHistory[watchHistory.length - 1] !== index) {
        watchHistory.push(index);
        if (watchHistory.length > 20) watchHistory.shift();
        localStorage.setItem("amateurHistory", JSON.stringify(watchHistory));
    }
}

function updateNextVideo() {
    const nextIndex = getUnwatchedVideo();
    document.getElementById("nextTitle").textContent = videosAmateur[nextIndex].title;
}

function updateRecommended() {
    const unwatched = videosAmateur
        .map((v, i) => ({ ...v, originalIndex: i }))
        .filter(v => !watchedVideos.includes(v.originalIndex) && v.originalIndex !== currentVideoIndex)
        .sort((a, b) => b.views - a.views)
        .slice(0, 8);
    
    const recommendations = unwatched.length >= 4 ? unwatched : 
        [...unwatched, ...videosAmateur
            .map((v, i) => ({ ...v, originalIndex: i }))
            .filter(v => v.originalIndex !== currentVideoIndex)
            .sort((a, b) => b.views - a.views)
            .slice(0, 8 - unwatched.length)];
    
    const grid = document.getElementById("recommendedGrid");
    if (grid) {
        grid.innerHTML = recommendations.map(video => `
            <div class="video-card" onclick="loadVideo(${video.originalIndex}, true)">
                <div class="card-thumbnail">
                    🎬
                    <div class="card-duration">${video.duration}</div>
                    ${!watchedVideos.includes(video.originalIndex) ? '<div class="badge-new">NUEVO</div>' : ''}
                </div>
                <div class="card-info">
                    <div class="card-title">${video.title}</div>
                    <div class="card-views">👁️ ${formatNumber(video.views)}</div>
                </div>
            </div>
        `).join('');
    }
}

function updateTopList() {
    const top = [...videosAmateur]
        .map((v, i) => ({ ...v, originalIndex: i }))
        .sort((a, b) => b.views - a.views)
        .slice(0, 5);
    
    const topListEl = document.getElementById("topList");
    if (topListEl) {
        topListEl.innerHTML = top.map((video, idx) => `
            <div class="top-item" onclick="loadVideo(${video.originalIndex}, true)">
                <div class="top-rank">${idx === 0 ? '👑' : idx + 1}</div>
                <div class="top-info">
                    <div class="top-title">${video.title}</div>
                    <div class="top-views">👁️ ${formatNumber(video.views)} vistas</div>
                </div>
            </div>
        `).join('');
    }
}

function updateButtonsState() {
    const prevBtn = document.getElementById("prevVideoBtn");
    if (prevBtn) {
        prevBtn.disabled = watchHistory.length <= 1;
    }
}

// ==================== EVENTOS DEL VIDEO ====================
const video = document.getElementById("video");
const playPauseBtn = document.getElementById("playPauseBtn");
const rewindBtn = document.getElementById("rewindBtn");
const forwardBtn = document.getElementById("forwardBtn");
const volUpBtn = document.getElementById("volUpBtn");
const volDownBtn = document.getElementById("volDownBtn");
const unmuteBtn = document.getElementById("unmuteBtn");
const fullscreenBtn = document.getElementById("fullscreenBtn");
const themeBtn = document.getElementById("themeBtn");
const speedBtn = document.getElementById("speedBtn");
const progressBar = document.getElementById("progressBar");
const bufferBar = document.getElementById("bufferBar");

function updateProgress() {
    if (video.duration) {
        const percent = (video.currentTime / video.duration) * 100;
        if (progressBar) progressBar.style.width = `${percent}%`;
    }
}

function updateBuffer() {
    if (video.buffered.length > 0 && video.duration) {
        const bufferedEnd = video.buffered.end(video.buffered.length - 1);
        const percent = (bufferedEnd / video.duration) * 100;
        if (bufferBar) bufferBar.style.width = `${percent}%`;
    }
}

video.addEventListener('timeupdate', updateProgress);
video.addEventListener('progress', updateBuffer);
video.addEventListener('waiting', () => showLoading(true));
video.addEventListener('playing', () => showLoading(false));
video.addEventListener('ended', () => {
    showToast("🎬 Video finalizado - Reproduciendo siguiente...", 2000);
    loadNextVideo();
});

const progressContainer = document.querySelector('.progress-bar-container');
if (progressContainer) {
    progressContainer.addEventListener('click', (e) => {
        const rect = e.currentTarget.getBoundingClientRect();
        const pos = (e.clientX - rect.left) / rect.width;
        video.currentTime = pos * video.duration;
    });
}

document.getElementById("prevVideoBtn")?.addEventListener('click', () => loadPreviousVideo());
document.getElementById("nextVideoBtn")?.addEventListener('click', () => loadNextVideo());
document.getElementById("nextUpCard")?.addEventListener('click', () => loadNextVideo());

// ==================== CONTROLES ====================
playPauseBtn?.addEventListener('click', () => {
    if (video.paused) {
        video.play();
        playPauseBtn.textContent = '⏸️';
    } else {
        video.pause();
        playPauseBtn.textContent = '▶️';
    }
});

rewindBtn?.addEventListener('click', () => {
    video.currentTime = Math.max(0, video.currentTime - 10);
    showToast(`⏪ -10s`);
});

forwardBtn?.addEventListener('click', () => {
    video.currentTime = Math.min(video.duration, video.currentTime + 10);
    showToast(`⏩ +10s`);
});

volUpBtn?.addEventListener('click', () => {
    let newVol = Math.min(1, video.volume + 0.1);
    video.volume = newVol;
    if (video.muted) video.muted = false;
    showToast(`🔊 ${Math.round(newVol * 100)}%`);
});

volDownBtn?.addEventListener('click', () => {
    let newVol = Math.max(0, video.volume - 0.1);
    video.volume = newVol;
    if (video.muted) video.muted = false;
    showToast(`🔉 ${Math.round(newVol * 100)}%`);
});

unmuteBtn?.addEventListener('click', () => {
    video.muted = !video.muted;
    unmuteBtn.textContent = video.muted ? '🔇' : '🔊';
    showToast(video.muted ? "🔇 Silenciado" : "🔊 Sonido activado");
});

fullscreenBtn?.addEventListener('click', () => {
    if (!document.fullscreenElement) {
        video.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
});

themeBtn?.addEventListener('click', () => {
    isDarkTheme = !isDarkTheme;
    if (isDarkTheme) {
        document.body.classList.remove('light');
        themeBtn.textContent = '🌙';
    } else {
        document.body.classList.add('light');
        themeBtn.textContent = '☀️';
    }
    localStorage.setItem('theme', isDarkTheme ? 'dark' : 'light');
});

speedBtn?.addEventListener('click', () => {
    const speeds = [0.5, 0.75, 1, 1.25, 1.5, 2];
    const currentIndex = speeds.indexOf(currentSpeed);
    currentSpeed = speeds[(currentIndex + 1) % speeds.length];
    video.playbackRate = currentSpeed;
    speedBtn.textContent = `${currentSpeed}x`;
    showToast(`⚡ Velocidad: ${currentSpeed}x`);
});

// ==================== TECLAS RÁPIDAS ====================
document.addEventListener('keydown', (e) => {
    switch(e.key) {
        case ' ': case 'Space':
            e.preventDefault();
            video.paused ? video.play() : video.pause();
            break;
        case 'ArrowLeft': video.currentTime -= 5; showToast(`⏪ -5s`); break;
        case 'ArrowRight': video.currentTime += 5; showToast(`⏩ +5s`); break;
        case 'ArrowUp': video.volume = Math.min(1, video.volume + 0.1); showToast(`🔊 ${Math.round(video.volume * 100)}%`); break;
        case 'ArrowDown': video.volume = Math.max(0, video.volume - 0.1); showToast(`🔉 ${Math.round(video.volume * 100)}%`); break;
        case 'm': case 'M': video.muted = !video.muted; break;
        case 'f': case 'F': document.fullscreenElement ? document.exitFullscreen() : video.requestFullscreen(); break;
        case 'n': case 'N': loadNextVideo(); break;
        case 'p': case 'P': loadPreviousVideo(); break;
    }
});

// ==================== INICIALIZACIÓN ====================
function init() {
    const savedViews = localStorage.getItem("amateurViews");
    if (savedViews) {
        const views = JSON.parse(savedViews);
        videosAmateur.forEach((v, i) => { if (views[i]) v.views = views[i]; });
    }
    
    const savedHistory = localStorage.getItem("amateurHistory");
    if (savedHistory) {
        watchHistory = JSON.parse(savedHistory);
    }
    
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') {
        isDarkTheme = false;
        document.body.classList.add('light');
        themeBtn.textContent = '☀️';
    }
    
    const startIndex = getUnwatchedVideo();
    loadVideo(startIndex, true);
    updateProgressDots();
    
    showToast("🎥 Amateur Zone - Videos NUEVOS siempre - SIN REPETICIONES!", 4000);
}

window.loadVideo = loadVideo;
window.loadNextVideo = loadNextVideo;
window.loadPreviousVideo = loadPreviousVideo;

init();
</script>
