<title>Videos</title>

<style>
body{
margin:0;
background:#000;
font-family:sans-serif;
overflow:hidden;
}

/* CONTENEDOR */
.container{
display:flex;
flex-direction:column;
height:100vh;
}

/* VIDEO (CLAVE AQUÍ) */
.video-box{
flex:1;
display:flex;
align-items:center;
justify-content:center;
background:#000;
padding-bottom:10px; /* 🔥 espacio para controles */
}

video{
width:100%;
max-height:90vh; /* 🔥 evita que tape la barra */
object-fit:contain;
}

/* BOTONES */
.controls{
position:absolute;
top:50%;
right:10px;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:10px;
z-index:10;
}

button{
background:#ff4081;
color:white;
border:none;
padding:12px;
border-radius:10px;
font-size:13px;
cursor:pointer;
}

.vip{
background:#ff9800;
}
</style>
</head>

<body>

<div class="container">

<div class="video-box">
<video id="video" controls playsinline preload="metadata"></video>
