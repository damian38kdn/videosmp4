<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Videos</title>

<style>
body{
margin:0;
background:#000;
font-family:sans-serif;
overflow:hidden;
}

/* CONTENEDOR */
.container{
display:flex;
flex-direction:column;
height:100vh;
}

/* VIDEO (CLAVE AQUÍ) */
.video-box{
flex:1;
display:flex;
align-items:center;
justify-content:center;
background:#000;
padding-bottom:10px; /* 🔥 espacio para controles */
}

video{
width:100%;
max-height:90vh; /* 🔥 evita que tape la barra */
object-fit:contain;
}

/* BOTONES */
.controls{
position:absolute;
top:50%;
right:10px;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:10px;
z-index:10;
}

button{
background:#ff4081;
color:white;
border:none;
padding:12px;
border-radius:10px;
font-size:13px;
cursor:pointer;
}

.vip{
background:#ff9800;
}
</style>
</head>

<body>

<div class="container">

<div class="video-box">
<video id="video" controls playsinline preload="metadata"></video>
</div>

<div class="controls">
<button onclick="anterior()">⏮</button>
<button onclick="siguiente()">▶</button>
<button class="vip" onclick="abrirVIP()">🔥</button>
</div>

</div>

<script>

const videos=[
"https://cdn.videy.co/3TDsDkUL1.mp4",
    "https://cdn.videy.co/Bhz5Cywo1.mp4",
    "https://cdn.videy.co/Xj04eIZq1.mp4",
    "https://cdn.videy.co/0l5TmQan1.mp4",
    "https://cdn.videy.co/KaNvTuB21.mp4",
    "https://cdn.videy.co/gFSHKsTM1.mp4",
    "https://cdn.videy.co/9Qs0pCeE1.mp4",
    "https://cdn.videy.co/3zW0bFxN1.mp4",
    "https://cdn.videy.co/xw3AzKMe1.mp4",
    "https://cdn.videy.co/MBeQ6Ip31.mp4",
    "https://cdn.videy.co/guZeTApm1.mp4",
    "https://cdn.videy.co/1Kmqyu3P1.mp4",
    "https://cdn.videy.co/7E3lOSFy1.mp4",
    "https://cdn.videy.co/YUEewdAa1.mp4",
    "https://cdn.videy.co/iahTw9Z01.mp4",
    "https://cdn.videy.co/1RT3GvWW1.mp4",
    "https://cdn.videy.co/7aRe679M1.mp4",
    "https://cdn.videy.co/wJqmMfZq1.mp4",
    "https://cdn.videy.co/yxkskzHw1.mp4",
    "https://cdn.videy.co/0gnPYSkl1.mp4",
    "https://cdn.videy.co/wcrgVdQS1.mp4",
    "https://cdn.videy.co/cltKJo6N1.mp4",
    "https://cdn.videy.co/fDaMV2OQ1.mp4",
    "https://cdn.videy.co/72kMK8hj1.mp4",
    "https://cdn.videy.co/DcUMv3nU1.mp4",
    "https://cdn.videy.co/Hx2xYVZK1.mp4",
    "https://cdn.videy.co/YjaS8z3G1.mp4",
    "https://cdn.videy.co/sSpmF3pA1.mp4",
    "https://cdn.videy.co/Nzg4a3JQ1.mp4",
    "https://cdn.videy.co/IpA7vPh11.mp4",
    "https://cdn.videy.co/cwYVBnYC1.mp4"
];

const video=document.getElementById("video");

let index=0;

function cargarVideo(){
video.src=videos[index];
video.muted=true;

video.play().catch(()=>{});
}

function siguiente(){
index = (index+1) % videos.length;
cargarVideo();
}

function anterior(){
index = (index-1+videos.length) % videos.length;
cargarVideo();
}

// desbloquear autoplay
document.addEventListener("click",()=>{
video.play();
},{once:true});

// visibilidad
document.addEventListener("visibilitychange",()=>{
document.hidden ? video.pause() : video.play();
});

// iniciar
cargarVideo();

function abrirVIP(){
window.location.href="https://prodtrousers.com/uf82usd6g?key=ff9b0340ae5cc9a571a3db304283727c";
}

</script>

</body>
</html>
